# Docker Compose配置 - LLM推理服务生产部署

version: '3.8'

services:
  # ============================================
  # vLLM推理服务 - 实例1
  # ============================================
  vllm-1:
    image: vllm/vllm-openai:latest
    container_name: vllm-1
    environment:
      - MODEL_NAME=qwen2.5-7b-instruct
      - TENSOR_PARALLEL_SIZE=2
      - GPU_MEMORY_UTILIZATION=0.9
      - ENABLE_PREFIX_CACHING=1
      - MAX_NUM_SEQS=256
      - MAX_MODEL_LEN=4096
    ports:
      - "8001:8000"
    volumes:
      - model-cache:/root/.cache
      - ./logs/vllm-1:/var/log/vllm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1']
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - llm-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # ============================================
  # vLLM推理服务 - 实例2
  # ============================================
  vllm-2:
    image: vllm/vllm-openai:latest
    container_name: vllm-2
    environment:
      - MODEL_NAME=qwen2.5-7b-instruct
      - TENSOR_PARALLEL_SIZE=2
      - GPU_MEMORY_UTILIZATION=0.9
      - ENABLE_PREFIX_CACHING=1
      - MAX_NUM_SEQS=256
      - MAX_MODEL_LEN=4096
    ports:
      - "8002:8000"
    volumes:
      - model-cache:/root/.cache
      - ./logs/vllm-2:/var/log/vllm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['2', '3']
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - llm-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # ============================================
  # vLLM推理服务 - 实例3
  # ============================================
  vllm-3:
    image: vllm/vllm-openai:latest
    container_name: vllm-3
    environment:
      - MODEL_NAME=qwen2.5-7b-instruct
      - TENSOR_PARALLEL_SIZE=2
      - GPU_MEMORY_UTILIZATION=0.9
      - ENABLE_PREFIX_CACHING=1
      - MAX_NUM_SEQS=256
      - MAX_MODEL_LEN=4096
    ports:
      - "8003:8000"
    volumes:
      - model-cache:/root/.cache
      - ./logs/vllm-3:/var/log/vllm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['4', '5']
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - llm-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # ============================================
  # Nginx负载均衡器
  # ============================================
  nginx:
    image: nginx:latest
    container_name: llm-nginx
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - vllm-1
      - vllm-2
      - vllm-3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - llm-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # ============================================
  # Prometheus监控
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: llm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped
    networks:
      - llm-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # ============================================
  # Grafana可视化
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: llm-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - llm-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

networks:
  llm-network:
    driver: bridge

volumes:
  model-cache:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
