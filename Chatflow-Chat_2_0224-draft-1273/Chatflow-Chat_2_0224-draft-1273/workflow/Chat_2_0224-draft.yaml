      position:
        x: 5240
        y: 2337.2500000000005
      parameters:
        code: "async def main(args: Args) -> Output:\n    params = args.params\n    input_data = params['input']\n    \n    # 创建一个字典来存储 name: 拼接地址\n    address_dict = {}\n    \n    # 处理多种可能的输入格式\n    if isinstance(input_data, dict):\n        # 格式1：完整的JSON结构\n        if 'data' in input_data and 'results' in input_data['data']:\n            results = input_data['data']['results']\n        # 格式2：直接传入results数组\n        elif 'results' in input_data:\n            results = input_data['results']\n        # 格式3：输入本身就是results数组或单个对象\n        else:\n            # 检查是否是包含address字段的字典数组\n            if isinstance(input_data.get('results'), list) or (isinstance(input_data, dict) and 'address' in input_data):\n                # 如果是单个字典或results字段，将其转换为列表\n                results = [input_data] if 'address' in input_data else input_data.get('results', [])\n            else:\n                results = []\n    elif isinstance(input_data, list):\n        # 输入直接就是数组\n        results = input_data\n    else:\n        results = []\n    \n    # 遍历results数组，提取name并拼接city, area, address\n    for item in results:\n        if isinstance(item, dict) and 'name' in item and 'address' in item:\n            # 获取name, city, area, address字段\n            name = item.get('name', '')\n            city = item.get('city', '')\n            area = item.get('area', '')\n            address = item.get('address', '')\n            \n            # 拼接格式：city + area + address\n            if city and area and address:\n                full_address = f\"{city}{area}{address}\"\n            elif city and address:\n                full_address = f\"{city}{address}\"\n            elif area and address:\n                full_address = f\"{area}{address}\"\n            else:\n                full_address = address\n            \n            # 将name作为键，拼接地址作为值存入字典\n            if name:  # 确保name不为空\n                address_dict[name] = full_address\n    \n    # 构建输出对象\n    ret: Output = {\n        \"address_mapping\": address_dict,  # 包含name->address的映射\n        \"count\": len(address_dict)  # 地址总数\n    }\n    \n    # 如果是完整的JSON结构，添加数据摘要\n    if isinstance(input_data, dict) and 'code' in input_data:\n        ret[\"data_summary\"] = {\n            \"status\": input_data.get('code', 'N/A'),\n            \"message\": input_data.get('msg', 'N/A'),\n            \"log_id\": input_data.get('log_id', 'N/A')\n        }\n    \n    return ret"
