            - name: |-
                查询天气：
                包含城市 + 天，时间 + 城市 + 天气类完整表述
            - name: |-
                新闻资讯查询：
                新闻、资讯、时事、报道、热点
            - name: |-
                网络搜索：
                信息查询、最新信息、可变信息、需核验真实性的内容、近期新闻、政策变动、节目、电影、电视剧、产品价格、明星动态、赛事结果、实时数据、动态信息
            - name: |-
                股票查询：
                股票实时股价、涨跌情况、行情走势
            - name: |
                行程规划：
                出行路线、旅游行程、出行安排、游玩攻略、交通规划、目的地游玩路线、几日游规划、出行方案、自驾、自由行、跟团行程
            - name: |-
                周边搜索：
                具体地点附近的美食、景点、公园、加油站、KTV、商场、超市等等
