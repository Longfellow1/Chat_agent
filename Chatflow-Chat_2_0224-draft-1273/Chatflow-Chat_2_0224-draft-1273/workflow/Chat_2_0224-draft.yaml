      parameters:
        code: "import re\nfrom datetime import datetime, timedelta\n\n# 定义参数和输出的基础结构（适配原有代码逻辑）\nclass Args:\n    def __init__(self, params):\n        self.params = params\n\nclass Output:\n    pass\n\nasync def main(args: Args) -> dict:  # 简化返回类型为dict，便于测试\n    params = args.params\n    \n    # ================= 1. 获取输入 =================\n    user_input = \"\"\n    keys_to_check = ['Query', 'query', 'input', 'USER_INPUT']\n    for key in keys_to_check:\n        if key in params and params[key]:\n            user_input = params[key]\n            break\n            \n    if not user_input and '_input' in params and isinstance(params['_input'], dict):\n        user_input = params['_input'].get('Query', \"\")\n        if not user_input:\n            user_input = params['_input'].get('input', \"\")\n\n    current_date_str = params.get('current_date', datetime.now().strftime(\"%Y-%m-%d\"))\n\n    # ================= 2. 提取逻辑 =================\n    hit_city = \"\"\n    hit_district = \"\"\n    travel_days = 0  # 新增：出行天数，默认0表示未提取到\n\n    # --- 提取区县 ---\n    match_district = re.search(r'([\\u4e00-\\u9fa5]{2,6}(?:区|县|镇|乡|旗|岛|街道))', user_input)\n    ignore_words = {'今天', '明天', '后天', '昨天', '前天', '大后天', '现在', '当前', '未来', '本周', '下周', '这个', '那个', '查询'}\n\n    if match_district:\n        cand = match_district.group(1)\n        if cand not in ignore_words:\n            hit_district = cand\n\n    # --- 提取城市 ---\n    all_cities = {\n        \"北京\", \"上海\", \"天津\", \"重庆\", \"香港\", \"澳门\", \"台北\", \"高雄\",\n        \"广州\", \"深圳\", \"珠海\", \"汕头\", \"佛山\", \"韶关\", \"湛江\", \"肇庆\", \"江门\", \"茂名\", \"惠州\", \"梅州\", \"汕尾\", \"河源\", \"阳江\", \"清远\", \"东莞\", \"中山\", \"潮州\", \"揭阳\", \"云浮\",\n        \"石家庄\", \"唐山\", \"秦皇岛\", \"邯郸\", \"邢台\", \"保定\", \"张家口\", \"承德\", \"沧州\", \"廊坊\", \"衡水\",\n        \"太原\", \"大同\", \"阳泉\", \"长治\", \"晋城\", \"朔州\", \"晋中\", \"运城\", \"忻州\", \"临汾\", \"吕梁\",\n        \"呼和浩特\", \"包头\", \"乌海\", \"赤峰\", \"通辽\", \"鄂尔多斯\", \"呼伦贝尔\", \"巴彦淖尔\", \"乌兰察布\", \"兴安\", \"锡林郭勒\", \"阿拉善\",\n        \"沈阳\", \"大连\", \"鞍山\", \"抚顺\", \"本溪\", \"丹东\", \"锦州\", \"营口\", \"阜新\", \"辽阳\", \"盘锦\", \"铁岭\", \"朝阳\", \"葫芦岛\",\n        \"长春\", \"吉林\", \"四平\", \"辽源\", \"通化\", \"白山\", \"松原\", \"白城\", \"延边\",\n        \"哈尔滨\", \"齐齐哈尔\", \"鸡西\", \"鹤岗\", \"双鸭山\", \"大庆\", \"伊春\", \"佳木斯\", \"七台河\", \"牡丹江\", \"黑河\", \"绥化\", \"大兴安岭\",\n        \"南京\", \"无锡\", \"徐州\", \"常州\", \"苏州\", \"南通\", \"连云港\", \"淮安\", \"盐城\", \"扬州\", \"镇江\", \"泰州\", \"宿迁\",\n        \"杭州\", \"宁波\", \"温州\", \"嘉兴\", \"湖州\", \"绍兴\", \"金华\", \"衢州\", \"舟山\", \"台州\", \"丽水\",\n        \"合肥\", \"芜湖\", \"蚌埠\", \"淮南\", \"马鞍山\", \"淮北\", \"铜陵\", \"安庆\", \"黄山\", \"滁州\", \"阜阳\", \"宿州\", \"六安\", \"亳州\", \"池州\", \"宣城\",\n        \"福州\", \"厦门\", \"莆田\", \"三明\", \"泉州\", \"漳州\", \"南平\", \"龙岩\", \"宁德\",\n        \"南昌\", \"景德镇\", \"萍乡\", \"九江\", \"新余\", \"鹰潭\", \"赣州\", \"吉安\", \"宜春\", \"抚州\", \"上饶\",\n        \"济南\", \"青岛\", \"淄博\", \"枣庄\", \"东营\", \"烟台\", \"潍坊\", \"济宁\", \"泰安\", \"威海\", \"日照\", \"临沂\", \"德州\", \"聊城\", \"滨州\", \"菏泽\",\n        \"郑州\", \"开封\", \"洛阳\", \"平顶山\", \"安阳\", \"鹤壁\", \"新乡\", \"焦作\", \"濮阳\", \"许昌\", \"漯河\", \"三门峡\", \"南阳\", \"商丘\", \"信阳\", \"周口\", \"驻马店\",\n        \"武汉\", \"黄石\", \"十堰\", \"宜昌\", \"襄阳\", \"鄂州\", \"荆门\", \"孝感\", \"荆州\", \"黄冈\", \"咸宁\", \"随州\", \"恩施\", \"仙桃\", \"潜江\", \"天门\", \"神农架\",\n        \"长沙\", \"株洲\", \"湘潭\", \"衡阳\", \"邵阳\", \"岳阳\", \"常德\", \"张家界\", \"益阳\", \"郴州\", \"永州\", \"怀化\", \"娄底\", \"湘西\",\n        \"南宁\", \"柳州\", \"桂林\", \"梧州\", \"北海\", \"防城港\", \"钦州\", \"贵港\", \"玉林\", \"百色\", \"贺州\", \"河池\", \"来宾\", \"崇左\",\n        \"海口\", \"三亚\", \"三沙\", \"儋州\",\n        \"成都\", \"自贡\", \"攀枝花\", \"泸州\", \"德阳\", \"绵阳\", \"广元\", \"遂宁\", \"内江\", \"乐山\", \"南充\", \"眉山\", \"宜宾\", \"广安\", \"达州\", \"雅安\", \"巴中\", \"资阳\", \"阿坝\", \"甘孜\", \"凉山\",\n        \"贵阳\", \"六盘水\", \"遵义\", \"安顺\", \"毕节\", \"铜仁\", \"黔西南\", \"黔东南\", \"黔南\",\n        \"昆明\", \"曲靖\", \"玉溪\", \"保山\", \"昭通\", \"丽江\", \"普洱\", \"临沧\", \"楚雄\", \"红河\", \"文山\", \"西双版纳\", \"大理\", \"德宏\", \"怒江\", \"迪庆\",\n        \"拉萨\", \"日喀则\", \"昌