                    self.params = params

            KEYWORD_LIST = [
                "美食", "餐厅", "饭店", "小吃", "火锅", "烧烤", "早餐", "午餐", "晚餐",
                "咖啡店", "咖啡", "奶茶",
                "酒店", "宾馆", "住宿", "民宿",
                "景点", "景区", "门票", "攻略", "路线",
                "停车场", "充电桩", "加油站",
                "地铁站", "公交站", "地铁", "公交",
                "药店", "医院",
                "超市", "商场",
                "厕所", "洗手间"
            ]

            SYNONYMS = [
                (r'好吃|吃什么|吃啥|吃饭|哪里吃|吃的|夜宵', "美食"),
                (r'住哪|住哪里|住的地方', "住宿"),
                (r'停车|停车位', "停车场"),
                (r'怎么走|怎么去|如何去', "路线"),
            ]

            POI_SUFFIX_REGEX = (
                r'([\u4e00-\u9fa5A-Za-z0-9]{2,40}'
                r'(?:路|街道|街|巷|弄|号|大道|大街|胡同|里|段|村|镇|乡|'
                r'广场|公园|景区|风景区|景点|'
                r'大厦|中心|大楼|写字楼|'
                r'大学|学院|中学|小学|医院|'
                r'机场|火车站|高铁站|车站|地铁站|站|码头|'
                r'桥|寺|塔|馆|'
                r'小区|苑|城))'
            )

            def _norm(s: str) -> str:
                s = (s or "").strip()
                s = re.sub(r'[\s，,。.!?？；;、]+', '', s)
                return s

            def _try_extract_from_json_str(s: str) -> str:
                """
                兼容你截图那种：Query里是一个JSON字符串 {"new_input":"..."}
                """
                s = (s or "").strip()
                if not (s.startswith("{") and s.endswith("}")):
                    return s
                try:
                    obj = json.loads(s)
                    if isinstance(obj, dict):
                        for k in ("new_input", "Query", "query", "input", "USER_INPUT"):
                            if obj.get(k):
                                return str(obj[k])
                except Exception:
                    pass
                return s

            def _clean_region(region: str) -> str:
                region = _norm(region)

                # ✅ 关键：去掉“推荐/建议/请/帮我/给我/麻烦...”等功能词前缀
                region = re.sub(
                    r'^(?:'
                    r'请|麻烦|帮忙|帮我|给我|帮我一下|给我一下|'
                    r'推荐|推荐一下|求推荐|'
                    r'建议|建议一下|'
                    r'查一下|搜一下|找一下|搜索|查找|查询|'
                    r'我要|我想|想要|需要|想|'
                    r'在|去|到|从|来'
                    r')+',
                    '',
                    region
                )

                # 防止残留“附近/周边”之类
                region = re.sub(r'(这里|那边|附近|周边|旁边|周围|一带)$', '', region)

                return region

            def _clean_keyword_candidate(kw: str) -> str:
                kw = _norm(kw)
                kw = re.sub(r'^(?:的)?(?:有没有|有吗|有什么|有哪些|推荐|查一下|帮我找|帮我搜|帮我查|搜索|找|搜|查)+', '', kw)
                return kw

            def _normalize_keyword(kw_candidate: str) -> str:
                kw_candidate = _clean_keyword_candidate(kw_candidate)

                for pat, canon in SYNONYMS:
                    if re.search(pat, kw_candidate):
                        return canon

                hits = [k for k in KEYWORD_LIST if k in kw_candidate]
                if hits:
                    return max(hits, key=len)

                m = re.search(r'([\u4e00-\u9fa5]{2,6})$', kw_candidate)
                if m:
                    tail = m.group(1)
                    if tail not in {"推荐", "攻略", "计划", "附近", "周边"}:
                        return tail

                return kw_candidate

            async def main(args: Args) -> dict:
                params = args.params

                # ========== 1) 获取输入 ==========
                user_input = ""
                for k in ['Query', 'query', 'input', 'USER_INPUT']:
                    if params.get(k):
                        user_input = str(params[k])
                        break
                if not user_input and isinstance(params.get('_input'), dict):
                    user_input = str(params['_input'].get('Query') or params['_input'].get('input') or "")

                # ✅ 兼容 Query 为 JSON 字符串
                user_input = _try_extract_from_json_str(user_input)

                text = _norm(user_input)

                # ========== 2) 核心抽取：XX(附近/周边/旁边/周围/一带)(的)YY ==========
                region = ""
                keyword_raw = ""
                keyword = ""

                m = re.search(
                    r'(?P<region>[\u4e00-\u9fa5A-Za-z0-9]{2,60})'
                    r'(?P<near>附近|周边|旁边|周围|一带)'
                    r'(?:的)?'
                    r'(?P<kw>.+)$',
                    text
                )
                if m:
                    region = _clean_region(m.group("region"))
                    keyword_raw = m.group("kw")
                    keyword = _normalize_keyword(keyword_raw)

                # 兜底：没命中“附近/周边”结构时，抓一个明显 POI 后缀 + 从剩余文本推 keyword
                if not region:
                    m2 = re.search(POI_SUFFIX_REGEX, text)
                    if m2:
                        region = _clean_region(m2.group(1))
                        keyword_raw = text.replace(region, "")
                        keyword = _normalize_keyword(keyword_raw)

                return {
                    "isOK": bool(region),
                    "region": region,
                    "keyword": keyword,
                    "keyword_raw": _clean_keyword_candidate(keyword_raw) if keyword_raw else ""
                }
        language: 3
        node_inputs:
            - name: Query
              input:
                value:
                    path: new_input
                    ref_node: "154827"
        node_outputs:
            isOK:
                type: boolean
                value: null
            keyword:
                type: string
                value: null
            keyword_raw:
                type: string
                value: null
            region:
                type: string
                value: null
        settingOnError:
            processType: 1
            retryTimes: 0
            switch: false
            timeoutMs: 60000
