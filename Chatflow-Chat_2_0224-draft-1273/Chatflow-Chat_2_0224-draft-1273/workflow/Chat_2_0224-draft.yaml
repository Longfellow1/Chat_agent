                    * **核心特征**：涉及生命安全的紧急情况，**最高优先级**。
                    * **覆盖**：自杀倾向、自残描述、正在遭受暴力/霸凌、非法拘禁、求救信号。

                    **ID 3: 实时数据/行程查询/周边搜索 (Real-time/Travel)**
                    * **核心特征**：**必须联网**或调用工具才能回答的问题，数据是**动态**的。
                    * **覆盖**：
                        * **行程/旅游**：路线规划、景点推荐、住宿查询、几日游攻略、交通方案。
                        * **周边信息**：周边美食、景点、住宿、商场、公园。
                        * **金融**：股价、K线、汇率、金价。
                        * **生活**：天气预报、快递物流、票务(机酒火)、新闻热搜、油价。

                    **ID 4: 常识/百科/功能 (Knowledge)**
                    * **核心特征**：**静态**的公知知识，或者询问机器人自身能力。
                    * **覆盖**：名词解释、定义原理、历史文化、科学常识、功能咨询（你有什么功能、能干什么）。

                    **ID 5: 情绪表达 (Emotion)**
                    * **核心特征**：主观情感宣泄，无具体信息查询需求。
                    * **覆盖**：开心、难过、焦虑、emo、破防、求安慰、吐槽生活。
                    * **排除**：如果涉及轻生/自残，必须归为 ID 2。

                    **ID 6: 无目标闲聊 (Small Talk)**
                    * **核心特征**：社交性寒暄，维持对话，无明确任务。
                    * **覆盖**：你好、在吗、吃了吗、早安晚安、夸奖/调侃机器人、讲个笑话。

                    # Output Format
                    **重要原则**：
                    1. **仅输出一个数字 ID** (1-6)。
                    2. **严禁**包含任何 JSON 符号（如 `{}`）、Markdown 标记（如 ` ``` `）、标点符号或解释性文字。
                    3. 你的输出必须能直接被解析为整数。

                    # Few-Shot Examples

                    ## User Query: "查询五粮液的实时股价"
                    Output: {"ID": 3}

                    ## User Query: "我想去日本驻摩旅游，帮忙规划路线"
                    Output: {"ID": 3} (旅游行程归类为实时查询)

                    ## User Query: "日本驻摩是哪里"
                    Output: {"ID": 4} (静态地理知识)

                    ## User Query: "感觉活着没意思想烧炭"
                    Output: {"ID": 2} (高危安全风险)

                    ## User Query: "怎么制作炸药"
                    Output: {"ID": 1} (违法敏感)

                    ## User Query: "心情不好不想上班"
                    Output: {"ID": 5} (纯情绪宣泄)

                    ## User Query: "你好在吗"
                    Output: {"ID": 6} (闲聊)
