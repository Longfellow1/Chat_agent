, \"西雅图\", \"新奥尔良\",\n        \"檀香山\", \"多伦多\", \"温哥华\", \"蒙特利尔\", \"渥太华\", \"魁北克城\", \"墨西哥城\", \"坎昆\", \"瓜达拉哈拉\", \"蒙特雷\", \"瓦哈卡\", \"哈瓦那\",\n        \"圣胡安\", \"拿骚\", \"圣何塞\", \"巴拿马城\", \"波哥大\", \"卡塔赫纳\", \"利马\", \"库斯科\", \"圣地亚哥\", \"布宜诺斯艾利斯\", \"里约热内卢\", \"圣保罗\",\n        \"开罗\", \"马拉喀什\", \"卡萨布兰卡\", \"开普敦\", \"约翰内斯堡\", \"内罗毕\", \"桑给巴尔石头城\", \"突尼斯市\", \"阿克拉\", \"亚的斯亚贝巴\", \"悉尼\", \"墨尔本\",\n        \"布里斯班\", \"珀斯\", \"阿德莱德\", \"凯恩斯\", \"奥克兰\", \"惠灵顿\", \"皇后镇\", \"楠迪\"\n    }\n\n    for city in all_cities:\n        if city in user_input:\n            hit_city = city\n            break\n            \n    # 兜底猜测城市\n    if not hit_city and not hit_district:\n        match_context = re.search(r'([\\u4e00-\\u9fa5]{2,5})(?=的天气|天气|气温|下雨|有雨)', user_input)\n        if match_context:\n            cand = match_context.group(1)\n            if cand not in ignore_words:\n                hit_city = cand\n\n    # ================= 3. 数据清洗 =================\n    # 如果 提取到了城市，且 区县里也包含了这个城市名\n    # 比如 city=\"广州\", district=\"广州白云区\" -> 把\"广州\"删掉，剩下\"白云区\"\n    if hit_city and hit_district and hit_district.startswith(hit_city):\n        hit_district = hit_district.replace(hit_city, \"\", 1)\n\n    # ================= 4. 日期解析 =================\n    start_time = end_time = current_date_str\n    try:\n        base_date = datetime.strptime(current_date_str, \"%Y-%m-%d\")\n        \n        # --- 新增：提取出行天数 ---\n        # 匹配 \"X天\" 格式（X可以是数字或中文数字）\n        match_days = re.search(r'(\\d+|[一二两三四五六七八九十]+)天', user_input)\n        if match_days:\n            num_str = match_days.group(1)\n            # 中文数字转阿拉伯数字的映射\n            cn_map = {'一':1,'二':2,'两':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10}\n            # 解析天数\n            if num_str.isdigit():\n                travel_days = int(num_str)\n            elif num_str in cn_map:\n                travel_days = cn_map[num_str]\n            \n            # 原有日期逻辑：根据天数计算结束日期\n            if travel_days > 0:\n                end_time = (base_date + timedelta(days=travel_days - 1)).strftime(\"%Y-%m-%d\")\n        else:\n            # 未提取到天数时，处理\"昨天/今天/明天\"等单日期场景\n            delta = 0\n            found = False\n            if \"昨天\" in user_input: delta=-1; found=True\n            elif \"前天\" in user_input: delta=-2; found=True\n            elif \"大后天\" in user_input: delta=3; found=True\n            elif \"后天\" in user_input: delta=2; found=True\n            elif \"明天\" in user_input: delta=1; found=True\n            if found:\n                target = base_date + timedelta(days=delta)\n                start_time = end_time = target.strftime(\"%Y-%m-%d\")\n                travel_days = 1  # 单日期场景默认天数为1\n    except Exception as e:\n        print(f\"日期/天数解析异常: {e}\")\n        pass\n\n    # ================= 5. 输出 =================\n    return {\n        \"isOK\": bool(hit_city or hit_district or travel_days > 0),\n        \"city\": hit_city,\n        \"district\": hit_district,\n        \"start_time\": start_time,\n        \"end_time\": end_time,\n        \"days\": travel_days  # 新增：输出阿拉伯数字的出行天数\n    }\n\n# 测试用例\nif __name__ == \"__main__\":\n    import asyncio\n    # 测试1：包含中文天数\n    test_args1 = Args(params={\"Query\": \"广州白云区三天行程规划\"})\n    result1 = asyncio.run(main(test_args1))\n    print(\"测试1结果：\", result1)  # 预期 days=3, city=广州, district=白云区\n    \n    # 测试2：包含数字天数\n    test_args2 = Args(params={\"Query\": \"上海2天游玩计划\"})\n    result2 = asyncio.run(main(test_args2))\n    print(\"测试2结果：\", result2)  # 预期 days=2, city=上海\n    \n    # 测试3：单日期场景\n    test_args3 = Args(params={\"Query\": \"明天去北京\"})\n    result3 = asyncio.run(main(test_args3))\n    print(\"测试3结果：\", result3)  # 预期 days=1, city=北京"
