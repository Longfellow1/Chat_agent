      parameters:
        code: "import re\nimport json\n\nasync def main(args):\n    params = args.get(\"params\", {})\n    \n    # ================= 1. 获取原始输入 =================\n    raw_input = \"\"\n    keys = ['user_query', 'input', 'Query', 'USER_INPUT']\n    for k in keys:\n        if params.get(k):\n            raw_input = str(params[k]).strip()\n            break\n            \n    if not raw_input and '_input' in params and isinstance(params['_input'], dict):\n        raw_input = str(params['_input'].get('Query', \"\")).strip()\n\n    # ================= 2. 智能拆包 (解析 LLM 输出) =================\n    # 初始化：默认检查原始文本，默认不信任 LLM ID (8)\n    text_to_check = raw_input\n    llm_suggested_id = 8\n    \n    try:\n        # 如果看起来像 JSON，尝试提取 new_input 和 ID\n        # 兼容处理：检查是否以 { 开头\n        if raw_input.startswith('{'):\n            data = json.loads(raw_input)\n            # 提取重写后的句子用于跑正则\n            if 'new_input' in data and data['new_input']:\n                text_to_check = data['new_input']\n            # 提取 LLM 的判断结果\n            if 'ID' in data:\n                llm_suggested_id = int(data['ID'])\n    except:\n        pass # 解析失败则按普通文本处理\n\n    # 统一小写，方便匹配\n    q = text_to_check.lower()\n    \n    # ================= 3. 全量规则库 (你提供的完整版) =================\n    \n    RULES = [\n        # --- ID 1: 违法/无意义/敏感/辱骂 (优先级最高) ---\n        (1, \n         # 1. 暴力破坏\n         r'炸掉|炸毁|爆破|制造炸弹|做炸药|燃烧瓶|土制|引爆|'\n         r'纵火|放火烧|投毒|下毒|毒死|氰化|砒霜|迷药|听话水|乖乖水|'\n         \n         # 2. 网络犯罪\n         r'盗号|盗取|破解密码|暴力破解|渗透教程|拿站|提权|脱库|撞库|'\n         r'攻击网站|攻击服务器|瘫痪网络|呼死你|轰炸机|远控|木马|免杀|'\n         r'外挂|辅助|透视|自瞄|私服|'\n         \n         # 3. 黄赌毒与违禁品\n         r'买枪|卖枪|军火|仿真枪|弩|火药|雷管|'\n         r'毒品|大麻|冰毒|白粉|海洛因|'\n         r'找小姐|招嫖|修车|裸聊|色情|黄片|AV|淫秽|'\n         r'网赌|博彩|下注|坐庄|六合彩|'\n         \n         # 4. 欺诈与黑产\n         r'办证|刻章|假币|假钞|洗钱|跑分|四件套|银行卡|黑户|'\n         r'代开|发票|避税|逃税|'\n         \n         # 5. 极端言论\n         r'推翻|暴乱|造反|恐怖主义|极端组织|邪教|'\n\n         # 6. 辱骂与人身攻击 (脏字类)\n         r'草泥马|草你|操你|日你|干你|'\n         r'傻逼|煞笔|沙雕|二逼|弱智|脑残|智障|白痴|'\n         r'滚蛋|滚开|去死|去你妈|尼玛|妈的|tmd|nmd|wcnm|cnm|sb|'\n         r'废物|贱人|烂人|垃圾人|狗日|畜生|'\n         r'杂种|野种|狗东西|'\n\n         # 7. 政治/敏感/邪教\n         r'法轮|法lun|法轮功|flg|转法轮|大法弟子|'\n         r'习近平|习大大|习主席|习jin平|xjp|维尼熊|包子|' \n         r'共产党|共匪|tg|土共|'\n         r'8964|六四|天安门事件|'\n\n         # 8. 变体/黑话/模糊污秽\n         r'草b|操b|艹b|cao\\s*b|c\\s*b|' \n         r'扣眼|抠眼|扣逼|抠逼|扣b|抠b|'\n         r'约炮|约吗|yp|'\n         r'骚货|浪货|逼样|'\n         r'牛子|鸡巴|几把|j8|jb|'\n         \n         # 9. 诅咒/家人/恶毒诅咒\n         r'nmsl|你妈死|他妈死|死妈|没妈|亲妈|'\n         r'死全家|全家死|全家暴毙|户口本|'\n         r'骨灰|灵车|坟头|上香|送终|'\n         r'孤儿|收尸|暴毙|棺材|绝后',\n         \n         # 排除词\n         r'打击|反|预防|电影|小说|故事|防止|法律|举报|警匪|梦见|新闻|科普|原理|危害|分类|回收|羊驼|学习|复习|练习|佛|寺庙'), \n\n        # --- ID 2: 人身安全/伤害 ---\n        (2, \n         r'自杀|轻生|不想活|想死|割腕|跳楼|喝药|安眠药|烧炭|上吊|绝望|'\n         r'杀人|砍人|捅死|弄死|搞死|'\n         r'绑架|勒索|撕票|软禁|监禁|'\n         r'强奸|迷奸|猥亵|'\n         r'报复社会|灭口|分尸|'\n         r'打架|斗殴|家暴|霸凌|被威胁|救命', \n         \n         r'电视|游戏|小说|剧情|比喻|笑死|吓死|狼人杀|剧本杀|法医|案件'), \n\n        # --- ID 3: 实时/查询 ---\n        (3, \n         r'今天|明天|后天|现在|当前|实时|最新|最近|未来|'\n         r'查一下|帮我查|搜索|找一下|有多少|几点|什么时候|'\n         r'天气|气温|下雨|有雨|预报|台风|地震|雾霾|空气质量|'\n         r'股价|股票|大盘|行情|涨跌|K线|汇率|金价|油价|比特币|'\n         r'新闻|资讯|热搜|头条|动态|政策|放假|调休|'\n         r'行程|攻略|路线|几日游|去哪玩|怎么去|自驾|跟团|导航|距离|'\n         r'周边|附近|'\n         r'航班|车次|机票|火车票|高铁|酒店|住宿|门票|'\n         r'快递|物流|单号|发货|比分|战报|赛程|排名|电影票|价格|多少钱|星座运势'\n         r'演过什么|唱过什么|有什么作品|代表作|主演|参演',\n         \n         r'是什么|含义|定义|原理|历史|由来'), \n\n        # --- ID 4: 常识/百科 ---\n        (4, \n         r'是什么|为什么|怎么回事|含义|定义|原理|机制|介绍一下|科普|'\n         r'历史|由来|背景|文化|地理|科学|常识|区别|对比|'\n         r'在哪|' \n         r'你有什么功能|你的功能|功能清单|能干什么|你会什么|使用帮助|说明书|怎么用', \n         \n         r'查一下|今天|明天|最新|实时|股价'), \n\n        # --- ID 5: 情绪表达 ---\n        (5, \n         r'开心|高兴|兴奋|满足|爽|'\n         r'难过|悲伤|伤心|失落|沮丧|低落|想哭|痛苦|'\n         r'焦虑|紧张|害怕|恐慌|压力大|心累|累了|烦|'\n         r'愤怒|生气|烦躁|气死|委屈|破防|emo|崩溃|压力好大|撑不住|受不了|想吐槽|'\n         r'孤独|寂寞|没人理|好烦', \n         \n         r'不难过|防止|如何治疗|医生|医院'),\n\n        # --- ID 6: 闲聊 ---\n        (6, \n         r'你好|您好|嗨|哈喽|hello|hi|在吗|在不在|出来|'\n         r'早安|晚安|午安|'\n         r'我叫|我是|我的名字|'\n         r'无聊|陪我|唠嗑|随便聊|和我聊天|说说话|没事干|'\n         r'谢谢|感恩|再见|拜拜|牛逼|厉害|666', \n         None),\n\n        # --- ID 7: 结束聊天 ---\n        (7, \n         r'^结束|退出|不用了|别说了|退下|闭嘴|够了|再见|拜拜|就这样|别聊了|先这样', \n         None),\n    ]\n\n    # ================= 4. 匹配执行 (优先正则) =================\n    final_intent_id = 8\n    regex_hit = False\n\n    for intent, include_pattern, exclude_pattern in RULES:\n        if re.search(include_pattern, q):\n            if exclude_pattern and re.search(exclude_pattern, q):\n                continue\n            final_intent_id = intent\n            regex_hit = True\n            break\n\n    # ================= 5. 决策融合 =================\n    # 正则已经匹配的，完全信任正则，忽略LLM建议\n    if regex_hit:\n    # 正则已经给出final_intent_id，直接使用\n       pass\n    else:\n    # 只有正则完全没匹配时，才考虑LLM建议\n       if llm_suggested_id in [1, 2, 3, 4, 5, 6, 7]:\n        final_intent_id = llm_suggested_id\n    # 否则保持final_intent_id = 8\n\n    # # ================= 5. 决策融合 (正则未命中则信任 LLM) =================\n    # if not regex_hit:\n    #     # 只有当 LLM 给出了有效的 ID (1-7) 时才采纳，否则保持 8\n    #     if llm_suggested_id in [1, 2, 3, 4, 5, 6, 7]:\n    #         final_intent_id = llm_suggested_id\n\n    # 统一输出字符串 ID，确保兼容性\n\n    \n    return {\n        \"intent_id\": str(final_intent_id)\n    }"
        language: 3
