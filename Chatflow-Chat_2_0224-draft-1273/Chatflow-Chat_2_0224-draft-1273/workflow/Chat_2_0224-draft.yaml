        code: "import re\nfrom datetime import datetime, timedelta\n\nasync def main(args: Args) -> Output:\n    params = args.params\n    \n    user_input = \"\"\n    keys_to_check = ['Query', 'query', 'input', 'USER_INPUT', '问题', '输入', '提问']\n    for key in keys_to_check:\n        if key in params and params[key]:\n            user_input = str(params[key]).strip()\n            break\n            \n    if not user_input and '_input' in params and isinstance(params['_input'], dict):\n        user_input = str(params['_input'].get('Query', params['_input'].get('input', \"\"))).strip()\n\n    current_date_str = params.get('current_date', datetime.now().strftime(\"%Y-%m-%d\"))\n    try:\n        base_date = datetime.strptime(current_date_str, \"%Y-%m-%d\")\n    except:\n        base_date = datetime.now()\n        current_date_str = base_date.strftime(\"%Y-%m-%d\")\n\n    time_ignore_words = {'今天', '明天', '后天', '昨天', '前天', '大后天', '现在', '当前', '未来', '本周', '下周', '这个', '那个', '什么', '有', '哪些', '哪'}\n    stock_companies = {\n        '苹果', '微软', '谷歌', '亚马逊', '特斯拉', '英伟达', '脸书', '元宇宙', '高通', '英特尔', '三星', '索尼',\n        '中兴', '茅台', '贵州茅台', '五粮液', '泸州老窖', '山西汾酒', '洋河股份', '古井贡酒', '伊利股份', '蒙牛', '海天味业',\n        '宁德时代', '比亚迪', '隆基绿能', '通威股份', '天齐锂业', '赣锋锂业', '亿纬锂能', '先导智能', '长城汽车', '长安汽车', '上汽集团',\n        '腾讯', '阿里', '阿里巴巴', '百度', '京东', '美团', '拼多多', '快手', '抖音', '字节跳动', '小红书', 'B站', '爱奇艺', '腾讯控股',\n        '华为', '小米', '小米集团', 'OPPO', 'vivo', '联想', '中芯国际', '北方华创', '兆易创新', '韦尔股份', '汇顶科技', '立讯精密', '歌尔股份',\n        '中石油', '中石化', '中国神华', '招商银行', '工商银行', '建设银行', '农业银行', '中国银行', '平安银行', '保利发展', '万科', '招商蛇口',\n        '格力电器', '美的集团', '海尔智家', '老板电器', '苏泊尔', '九阳股份',\n        '药明康德', '恒瑞医药', '迈瑞医疗', '片仔癀', '云南白药', '爱尔眼科', '通策医疗', '智飞生物',\n        '顺丰', '中通', '圆通', '韵达', '申通', '京东物流', '滴滴', '携程',\n        '中国船舶', '中航沈飞', '北方稀土', '紫金矿业', '洛阳钼业'\n    }\n\n    hit_time = \"\"\n    hit_company = \"\"\n\n    time_map = [\n        ('大后天', 3, '大后天'),\n        ('后天', 2, '后天'),\n        ('明天', 1, '明天'),\n        ('今天', 0, '今天'),\n        ('昨天', -1, '昨天'),\n        ('前天', -2, '前天'),\n        ('本周', 0, '本周'),\n        ('下周', 7, '下周'),\n        ('近期', 0, '近期'),\n        ('最新', 0, '最新'),\n        ('昨日', -1, '昨天'),\n        ('前日', -2, '前天')\n    ]\n    for time_key, delta, show_name in time_map:\n        if time_key in user_input:\n            hit_time = show_name\n            break\n    if not hit_time:\n        hit_time = '今天'\n\n    sorted_companies = sorted(stock_companies, key=lambda x: len(x), reverse=True)\n    for company in sorted_companies:\n        if company in user_input:\n            hit_company = company\n            break\n    for word in time_ignore_words:\n        hit_company = hit_company.replace(word, \"\")\n\n    result_parts = [hit_time, hit_company]\n    result = ' '.join([part for part in result_parts if part])\n\n    struct_result = {\n        \"isOK\": bool(hit_company),\n        \"query_time\": hit_time,\n        \"query_date\": current_date_str,\n        \"company_name\": hit_company,\n        \"final_result\": result\n    }\n\n    return struct_result"
