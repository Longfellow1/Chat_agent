# Nginx配置 - LLM推理服务负载均衡

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # 上游服务器定义
    upstream vllm_backend {
        # 最少连接负载均衡
        least_conn;
        
        # vLLM实例
        server vllm-1:8000 max_fails=3 fail_timeout=30s weight=1;
        server vllm-2:8000 max_fails=3 fail_timeout=30s weight=1;
        server vllm-3:8000 max_fails=3 fail_timeout=30s weight=1;
        
        # 连接池配置
        keepalive 32;
        keepalive_requests 100;
        keepalive_timeout 60s;
    }

    # 健康检查端点
    server {
        listen 80;
        server_name _;

        # 健康检查
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # 指标端点
        location /metrics {
            access_log off;
            proxy_pass http://vllm_backend;
        }

        # LLM API代理
        location /v1/ {
            proxy_pass http://vllm_backend;
            
            # HTTP版本
            proxy_http_version 1.1;
            
            # 连接复用
            proxy_set_header Connection "";
            
            # 请求头
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Request-ID $request_id;
            
            # 超时配置
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # 缓冲配置
            proxy_buffering off;
            proxy_request_buffering off;
            
            # 错误处理
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 30s;
        }

        # 根路径
        location / {
            return 404;
        }
    }

    # 监控和日志服务器
    server {
        listen 8080;
        server_name _;

        # Prometheus指标
        location /metrics {
            access_log off;
            return 200 "# HELP nginx_requests_total Total requests\n";
            add_header Content-Type text/plain;
        }

        # 状态页面
        location /status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;  # Docker网络
            deny all;
        }
    }
}
